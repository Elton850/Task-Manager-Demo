services:
  - type: web
    name: task-manager-demo
    runtime: node
    region: oregon
    plan: free
    buildCommand: "npm run build:render"
    startCommand: "node dist/server.demo.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: render-demo-change-this-secret-at-least-32chars
      - key: SUPER_ADMIN_KEY
        value: render-demo-super-admin-key
      - key: VITE_FORCE_TENANT
        value: demo
      - key: VITE_DEMO_MODE
        value: "true"
      - key: ALLOWED_ORIGINS
        value: ""
